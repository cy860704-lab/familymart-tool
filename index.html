<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全家店到店 批次匯入工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --green: #00a651;
    --green-dark: #007a3d;
    --green-light: #e6f7ed;
    --green-mid: #b3e6cc;
    --yellow: #ffd600;
    --red: #e53935;
    --red-light: #fff0f0;
    --orange: #f57c00;
    --orange-light: #fff8f0;
    --gray-50: #f8f9fa;
    --gray-100: #f1f3f4;
    --gray-200: #e8eaed;
    --gray-400: #9aa0a6;
    --gray-600: #5f6368;
    --gray-800: #202124;
    --white: #ffffff;
    --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--gray-50);
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--green);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,166,81,0.3);
  }
  header .logo {
    width: 32px; height: 32px;
    background: var(--white);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  header h1 { color: var(--white); font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
  header span { color: rgba(255,255,255,0.75); font-size: 13px; margin-left: auto; }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  /* STEPS */
  .steps {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .step {
    flex: 1;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-right: 1px solid var(--gray-200);
    cursor: default;
    transition: background 0.2s;
    position: relative;
  }
  .step:last-child { border-right: none; }
  .step-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--gray-200);
    color: var(--gray-600);
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .step-label { font-size: 13px; color: var(--gray-600); font-weight: 500; }
  .step.active .step-num { background: var(--green); color: white; }
  .step.active .step-label { color: var(--green-dark); }
  .step.done .step-num { background: var(--green); color: white; }
  .step.done .step-num::after { content: '✓'; }
  .step.done .step-num span { display: none; }

  /* CARD */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-header h2 { font-size: 15px; font-weight: 700; color: var(--gray-800); }
  .card-header .badge {
    margin-left: auto;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--green-light);
    color: var(--green-dark);
    font-weight: 600;
  }
  .card-body { padding: 20px; }

  /* SENDER FORM */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--gray-600);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .form-group input, .form-group select {
    width: 100%;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    background: var(--white);
    color: var(--gray-800);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--green);
  }
  .form-group input:disabled {
    background: var(--gray-100);
    color: var(--gray-400);
  }

  /* ORDER TABLE */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--gray-50);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    color: var(--gray-600);
    border-bottom: 2px solid var(--gray-200);
    white-space: nowrap;
    font-size: 12px;
  }
  tbody tr {
    border-bottom: 1px solid var(--gray-100);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--gray-50); }
  tbody td {
    padding: 10px 12px;
    vertical-align: middle;
  }
  tbody td input {
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    padding: 5px 8px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    background: transparent;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  tbody td input:focus {
    border-color: var(--green);
    background: var(--white);
  }
  .col-name { min-width: 90px; }
  .col-phone { min-width: 120px; }
  .col-store { min-width: 130px; }
  .col-no { min-width: 85px; }
  .col-verify { width: 100px; }
  .col-del { width: 44px; }

  /* STATUS BADGES */
  .status { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .status.ok { background: var(--green-light); color: var(--green-dark); }
  .status.warn { background: var(--orange-light); color: var(--orange); }
  .status.err { background: var(--red-light); color: var(--red); }
  .status.checking { background: var(--gray-100); color: var(--gray-600); }
  .status.pending { background: var(--gray-100); color: var(--gray-400); }

  /* ROW HIGHLIGHT */
  tr.row-warn td { background: #fff8f0; }
  tr.row-err td { background: #fff0f0; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-primary:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--green); border: 1.5px solid var(--green); }
  .btn-outline:hover { background: var(--green-light); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-del { background: transparent; border: none; color: var(--gray-400); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 4px; }
  .btn-del:hover { color: var(--red); background: var(--red-light); }

  .actions {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--gray-200);
    background: var(--gray-50);
  }
  .actions .hint { font-size: 12px; color: var(--gray-400); margin-left: auto; }

  /* VERIFY PANEL */
  .verify-panel {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
    display: none;
  }
  .verify-panel.show { display: block; }
  .verify-summary {
    display: flex;
    gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--gray-200);
    flex-wrap: wrap;
  }
  .verify-stat {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px;
  }
  .verify-stat strong { font-size: 22px; font-weight: 700; }
  .verify-stat.ok strong { color: var(--green); }
  .verify-stat.warn strong { color: var(--orange); }
  .verify-stat.err strong { color: var(--red); }
  .verify-issues { padding: 16px 20px; }
  .issue-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    font-size: 13px;
  }
  .issue-item.warn { background: var(--orange-light); border-left: 3px solid var(--orange); }
  .issue-item.err { background: var(--red-light); border-left: 3px solid var(--red); }
  .issue-item .issue-row { font-weight: 700; flex-shrink: 0; min-width: 50px; }
  .issue-item .issue-detail { flex: 1; line-height: 1.6; }
  .issue-item .issue-actions { display: flex; gap: 8px; margin-left: auto; flex-shrink: 0; align-items: center; }
  .issue-item .issue-fix { color: var(--green-dark); font-weight: 600; cursor: pointer; white-space: nowrap; font-size: 13px; }
  .issue-item .issue-fix:hover { text-decoration: underline; }
  .issue-item .issue-keep { color: var(--gray-600); font-weight: 600; cursor: pointer; white-space: nowrap; font-size: 13px; border: 1.5px solid var(--gray-300); border-radius: 5px; padding: 3px 10px; background: var(--white); }
  .issue-item .issue-keep:hover { background: var(--gray-100); }
  .issue-item .issue-edit { color: var(--orange); font-weight: 600; cursor: pointer; white-space: nowrap; font-size: 13px; border: 1.5px solid var(--orange); border-radius: 5px; padding: 3px 10px; background: var(--white); }
  .issue-item .issue-edit:hover { background: var(--orange-light); }
  .status.manual { background: #e8f4fd; color: #1a73e8; }
  tr.row-manual td { background: #f0f7ff; }

  /* PROGRESS */
  .progress-bar {
    height: 3px;
    background: var(--gray-200);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 20px 16px;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  /* IMPORT ZONE */
  .import-zone {
    border: 2px dashed var(--gray-200);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .import-zone:hover, .import-zone.dragover {
    border-color: var(--green);
    background: var(--green-light);
  }
  .import-zone p { font-size: 14px; color: var(--gray-600); margin-top: 6px; }
  .import-zone .icon { font-size: 28px; }

  /* TOOLTIP */
  .tip { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

  .add-row-btn {
    display: flex; align-items: center; gap: 6px;
    width: 100%; padding: 10px 12px;
    background: none; border: none; border-top: 1px dashed var(--gray-200);
    color: var(--green); font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: left; font-family: inherit;
    transition: background 0.15s;
  }
  .add-row-btn:hover { background: var(--green-light); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display: inline-block; }

  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .steps { flex-wrap: wrap; }
    .step { flex: 0 0 50%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🏪</div>
  <h1>全家店到店 批次匯入工具</h1>
  <span>自動驗證門市 ✓</span>
</header>

<div class="container">

  <!-- STEPS -->
  <div class="steps">
    <div class="step active" id="step1">
      <div class="step-num"><span>1</span></div>
      <div class="step-label">填寄件人 & KEY單</div>
    </div>
    <div class="step" id="step2">
      <div class="step-num"><span>2</span></div>
      <div class="step-label">自動驗證門市</div>
    </div>
    <div class="step" id="step3">
      <div class="step-num"><span>3</span></div>
      <div class="step-label">確認 & 下載</div>
    </div>
  </div>

  <!-- SENDER INFO -->
  <div class="card">
    <div class="card-header">
      <span>📦</span>
      <h2>寄件人資訊（固定）</h2>
    </div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group">
          <label>寄件人姓名</label>
          <input id="senderName" type="text" value="楊巧寧" placeholder="姓名">
        </div>
        <div class="form-group">
          <label>寄件人手機</label>
          <input id="senderPhone" type="text" value="0910945730" placeholder="09xxxxxxxx">
        </div>
        <div class="form-group">
          <label>國碼</label>
          <input type="text" value="886" disabled>
        </div>
        <div class="form-group">
          <label>寄件服務</label>
          <select id="serviceCode">
            <option value="1" selected>1 — 常溫一般</option>
            <option value="2">2 — 常溫理賠加值10</option>
            <option value="3">3 — 常溫理賠加值20</option>
            <option value="7">7 — 常溫小物袋</option>
            <option value="8">8 — 常溫大材積</option>
            <option value="11">11 — 常溫取貨付款</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- IMPORT ZONE -->
  <div class="import-zone" id="importZone">
    <div class="icon">📂</div>
    <p><strong>點擊或拖曳</strong>上傳代購表單 xlsx（可選，或直接手動KEY單）</p>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
  </div>

  <!-- ORDER TABLE -->
  <div class="card">
    <div class="card-header">
      <span>📋</span>
      <h2>收件清單</h2>
      <div class="badge" id="rowCount">0 筆</div>
    </div>
    <div class="table-wrap">
      <table id="orderTable">
        <thead>
          <tr>
            <th>#</th>
            <th class="col-name">收件人姓名</th>
            <th class="col-phone">手機號碼</th>
            <th class="col-store">取件門市</th>
            <th class="col-no">店號</th>
            <th class="col-verify">驗證結果</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="orderBody"></tbody>
      </table>
      <button class="add-row-btn" onclick="addRow()">＋ 新增一筆</button>
    </div>
    <div class="actions">
      <button class="btn btn-outline btn-sm" onclick="clearAll()">🗑 清空</button>
      <button class="btn btn-primary" id="verifyBtn" onclick="verifyAll()" disabled>
        🔍 驗證所有門市
      </button>
      <span class="hint" id="verifyHint">KEY完單後按「驗證所有門市」</span>
    </div>
  </div>

  <!-- VERIFY PANEL -->
  <div class="verify-panel" id="verifyPanel">
    <div class="card-header">
      <span>✅</span>
      <h2>驗證結果</h2>
    </div>
    <div id="progressWrap" style="padding:12px 20px 0; display:none;">
      <div style="font-size:12px; color:var(--gray-400); margin-bottom:6px;" id="progressText">查詢中...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="verify-summary" id="verifySummary"></div>
    <div class="verify-issues" id="verifyIssues"></div>
    <div class="actions">
      <button class="btn btn-primary" id="downloadBtn" onclick="downloadXlsx()" disabled>
        ⬇ 下載全家批次匯入 xlsx
      </button>
    </div>
  </div>

</div>

<script>
// ==================== 全家官方門市資料 ====================
// 從 https://nevent.family.com.tw/cloudprintSTORELIST/ 抓取
let officialStores = null;

async function fetchOfficialStores() {
  if (officialStores) return officialStores;
  try {
    const resp = await fetch('https://nevent.family.com.tw/cloudprintSTORELIST/', { cache: 'no-cache' });
    const html = await resp.text();
    const dict = {};
    const re = /\|\s*(\d{6})\s*\|\s*([^|\n]+?)\s*\|/g;
    let m;
    while ((m = re.exec(html)) !== null) {
      const no = m[1].trim();
      const name = m[2].trim();
      if (no && name && name !== '店舖名稱') dict[no] = name;
    }
    if (Object.keys(dict).length > 50) {
      officialStores = dict;
      console.log('✅ 全家官網門市資料載入成功，共', Object.keys(dict).length, '筆');
      return dict;
    }
  } catch(e) {
    console.log('⚠️ 無法連線全家官網，使用內建資料:', e.message);
  }
  officialStores = BUILT_IN_STORES;
  return officialStores;
}

// ==================== TABLE ====================
let rows = [];
let rowId = 0;

function addRow(data = {}) {
  rowId++;
  const id = rowId;
  rows.push({ id, ...data, status: 'pending', official: null });
  renderRows();
  updateUI();
  // 讓最後一行的第一個 input focus
  setTimeout(() => {
    const lastRow = document.querySelector(`tr[data-id="${id}"] input`);
    if (lastRow && !data.name) lastRow.focus();
  }, 50);
}

function deleteRow(id) {
  rows = rows.filter(r => r.id !== id);
  renderRows();
  updateUI();
}

function clearAll() {
  if (!confirm('確定清空所有資料？')) return;
  rows = [];
  renderRows();
  updateUI();
  document.getElementById('verifyPanel').classList.remove('show');
}

function getRowData(id) {
  return rows.find(r => r.id === id);
}

function updateRowField(id, field, val) {
  const r = rows.find(r => r.id === id);
  if (r) {
    r[field] = val;
    r.status = 'pending';
    r.official = null;
    updateUI();
  }
}

function renderRows() {
  const tbody = document.getElementById('orderBody');
  tbody.innerHTML = rows.map((r, i) => `
    <tr data-id="${r.id}" class="${r.status === 'warn' ? 'row-warn' : r.status === 'err' ? 'row-err' : r.status === 'manual' ? 'row-manual' : ''}">
      <td style="color:var(--gray-400); font-size:12px; font-family:'DM Mono',monospace;">${i+1}</td>
      <td class="col-name"><input value="${esc(r.name||'')}" placeholder="姓名" onchange="updateRowField(${r.id},'name',this.value)" oninput="updateRowField(${r.id},'name',this.value)"></td>
      <td class="col-phone"><input value="${esc(r.phone||'')}" placeholder="09xxxxxxxx" onchange="updateRowField(${r.id},'phone',this.value)" oninput="updateRowField(${r.id},'phone',this.value)"></td>
      <td class="col-store"><input value="${esc(r.store||'')}" placeholder="門市名稱" onchange="updateRowField(${r.id},'store',this.value)" oninput="updateRowField(${r.id},'store',this.value)" onblur="autoVerifyRow(${r.id})"></td>
      <td class="col-no"><input value="${esc(r.storeNo||'')}" placeholder="6碼" maxlength="6" onchange="updateRowField(${r.id},'storeNo',this.value)" oninput="updateRowField(${r.id},'storeNo',this.value)" onblur="autoVerifyRow(${r.id})"></td>
      <td class="col-verify">${renderStatus(r)}</td>
      <td class="col-del"><button class="btn-del" onclick="deleteRow(${r.id})" title="刪除">✕</button></td>
    </tr>
  `).join('');
  document.getElementById('rowCount').textContent = rows.length + ' 筆';
}

function renderStatus(r) {
  if (r.status === 'ok') return `<span class="status ok">✓ 正確</span>`;
  if (r.status === 'manual') return `<span class="status manual">✎ 手動確認</span>`;
  if (r.status === 'kept') return `<span class="status ok">✓ 照舊</span>`;
  if (r.status === 'warn') return `<span class="status warn">⚠ ${esc(r.warnMsg||'')}</span>`;
  if (r.status === 'err') return `<span class="status err">✕ ${esc(r.errMsg||'')}</span>`;
  if (r.status === 'checking') return `<span class="status checking"><span class="spin">⟳</span> 查詢中</span>`;
  return `<span class="status pending">— 待驗證</span>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateUI() {
  const hasRows = rows.length > 0;
  document.getElementById('verifyBtn').disabled = !hasRows;
  renderRows();
}

// ==================== VERIFY ====================
async function autoVerifyRow(id) {
  const r = rows.find(r => r.id === id);
  if (!r || !r.storeNo || r.storeNo.length !== 6) return;
  r.status = 'checking';
  renderRows();
  const stores = await fetchOfficialStores();
  await verifyRowAsync(r, stores);
  renderRows();
  updateVerifyPanel();
}

// 即時查詢全家 API（單筆店號）
async function lookupStoreOnline(storeNo) {
  try {
    const url = `https://family.map.com.tw/famiport/api/getStoreFreeze.ashx?searchType=StoreNumber&storeId=${storeNo}&freeze=0`;
    const resp = await fetch(url, {
      headers: { 'Referer': 'https://family.map.com.tw/famiport/storeNumberFreeze.aspx' }
    });
    const text = await resp.text();
    // 回傳格式：showStoreList([{...}]) 或 JSON array
    const json = text.replace(/^[^[{]*/, '').replace(/[^}\]]*$/, '');
    const data = JSON.parse(json);
    const arr = Array.isArray(data) ? data : (data.length ? data : null);
    if (arr && arr.length > 0) {
      const s = arr[0];
      const name = s.StoreName || s.storeName || s.name || '';
      if (name) {
        // 快取進 officialStores
        if (officialStores) officialStores[storeNo] = name;
        return name;
      }
    }
  } catch(e) {}
  return null;
}

function compareStoreName(storeName, official) {
  if (!storeName) return 'ok';
  const yourClean = storeName.replace(/^全家/, '').replace(/店$/, '').trim();
  const offClean = official.replace(/店$/, '').trim();
  if (yourClean === offClean || storeName === official || storeName.replace(/^全家/, '') === official) return 'ok';
  if (official.includes(yourClean) || yourClean.includes(offClean)) return 'warn';
  return 'mismatch';
}

async function verifyRowAsync(r, stores) {
  const no = (r.storeNo || '').trim();
  const storeName = (r.store || '').trim();

  if (!no || no.length !== 6) {
    r.status = 'err'; r.errMsg = '店號非6碼'; r.official = null;
    return;
  }

  let official = stores[no];

  // 內建查無 → 即時打全家 API
  if (!official) {
    r.status = 'checking';
    official = await lookupStoreOnline(no);
  }

  if (!official) {
    r.status = 'err'; r.errMsg = '查無此店號'; r.official = null;
    return;
  }

  r.official = official;
  const cmp = compareStoreName(storeName, official);
  if (cmp === 'ok') {
    r.status = 'ok';
  } else if (cmp === 'warn') {
    r.status = 'warn'; r.warnMsg = '名稱差異';
  } else {
    r.status = 'warn'; r.warnMsg = '名稱不符';
  }
}

async function verifyAll() {
  if (!rows.length) return;

  const btn = document.getElementById('verifyBtn');
  btn.disabled = true;
  btn.textContent = '⟳ 查詢中...';

  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('verifyPanel').classList.add('show');

  const stores = await fetchOfficialStores();

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    r.status = 'checking';
    renderRows();
    document.getElementById('progressFill').style.width = Math.round((i / rows.length) * 100) + '%';
    document.getElementById('progressText').textContent = `驗證中 ${i+1} / ${rows.length}`;
    await verifyRowAsync(r, stores);
    renderRows();
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = '✓ 驗證完成';
  setTimeout(() => { document.getElementById('progressWrap').style.display = 'none'; }, 1500);

  btn.disabled = false;
  btn.textContent = '🔍 重新驗證';

  updateVerifyPanel();
  setStep(3);
}

function updateVerifyPanel() {
  const ok = rows.filter(r => r.status === 'ok').length;
  const warn = rows.filter(r => r.status === 'warn').length;
  const err = rows.filter(r => r.status === 'err').length;
  const pending = rows.filter(r => r.status === 'pending').length;
  const total = rows.length;

  document.getElementById('verifySummary').innerHTML = `
    <div class="verify-stat ok"><strong>${ok}</strong><span>正確</span></div>
    <div class="verify-stat warn"><strong>${warn}</strong><span>名稱差異</span></div>
    <div class="verify-stat err"><strong>${err}</strong><span>有問題</span></div>
    <div class="verify-stat"><strong>${pending}</strong><span>未驗證</span></div>
    <div class="verify-stat"><strong>${total}</strong><span>總筆數</span></div>
  `;

  const issues = rows.filter(r => r.status === 'warn' || r.status === 'err');
  if (issues.length === 0) {
    document.getElementById('verifyIssues').innerHTML = `<div style="padding:8px 0; color:var(--green); font-weight:600;">🎉 所有門市驗證通過！</div>`;
  } else {
    document.getElementById('verifyIssues').innerHTML = issues.map((r, i) => {
      const rowNum = rows.indexOf(r) + 1;
      const isErr = r.status === 'err';
      const fix = r.official ? `官方：<strong>${r.official}</strong>` : '';
      const fixBtn = r.official ? `<span class="issue-fix" onclick="fixRow(${r.id})" title="改成官方名稱">套用官方名稱</span>` : '';
      return `
        <div class="issue-item ${isErr ? 'err' : 'warn'}">
          <span class="issue-row">第 ${rowNum} 筆</span>
          <span class="issue-detail">
            <strong>${esc(r.name||'')}</strong>｜${esc(r.store||'')}（店號 ${r.storeNo}）<br>
            ${isErr ? (r.errMsg || '錯誤') : r.warnMsg}${fix ? '，' + fix : ''}
          </span>
          <div class="issue-actions">
            <button class="issue-edit" onclick="editRow(${r.id})" title="手動修改店名或店號">✎ 手動編輯</button>
            <button class="issue-keep" onclick="keepRow(${r.id})" title="確認此筆資料正確，照原本匯出">✓ 照舊</button>
            ${fixBtn}
          </div>
        </div>`;
    }).join('');
  }

  const unresolvedErr = rows.filter(r => r.status === 'err' || r.status === 'warn').length;
  const canDownload = rows.length > 0 && unresolvedErr === 0;
  document.getElementById('downloadBtn').disabled = !canDownload;
  document.getElementById('downloadBtn').title = unresolvedErr > 0 ? `還有 ${unresolvedErr} 筆需處理（可按「照舊」跳過）` : '';
}

function fixRow(id) {
  const r = rows.find(r => r.id === id);
  if (r && r.official) {
    r.store = r.official;
    r.status = 'ok';
    renderRows();
    updateVerifyPanel();
  }
}

function keepRow(id) {
  const r = rows.find(r => r.id === id);
  if (r) {
    r.status = 'kept';
    renderRows();
    updateVerifyPanel();
  }
}

      </div>

function saveEdit(id) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  r.store = document.getElementById('editStore').value.trim();
  r.storeNo = document.getElementById('editStoreNo').value.trim();
  r.status = 'manual';
  document.getElementById('editModal').remove();
  renderRows();
  updateVerifyPanel();
}

// ==================== IMPORT XLSX ====================
const importZone = document.getElementById('importZone');
const fileInput = document.getElementById('fileInput');

importZone.addEventListener('click', () => fileInput.click());
importZone.addEventListener('dragover', e => { e.preventDefault(); importZone.classList.add('dragover'); });
importZone.addEventListener('dragleave', () => importZone.classList.remove('dragover'));
importZone.addEventListener('drop', e => {
  e.preventDefault(); importZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, {defval:''});
    if (!raw.length) return;

    const keys = Object.keys(raw[0]);
    const find = (...pats) => keys.find(k => pats.some(p => k.includes(p)));
    const nameCol = find('收件人姓名','真實姓名');
    const phoneCol = find('電話','手機');
    const storeCol = find('門市名稱','店名','取件門市名稱');
    const noCol = find('店號','6碼');

    if (!nameCol || !phoneCol) { alert('找不到收件人姓名或電話欄位，請確認格式'); return; }

    rows = [];
    raw.forEach(r => {
      const name = String(r[nameCol]||'').trim();
      if (!name) return;
      let phone = String(r[phoneCol]||'').replace(/\D/g,'');
      if (!phone.startsWith('0')) phone = '0' + phone;
      let storeNo = noCol ? String(r[noCol]||'').replace(/[^\d]/g,'') : '';
      if (storeNo.length > 6) storeNo = storeNo.slice(0,6);
      const store = storeCol ? String(r[storeCol]||'').trim() : '';
      rowId++;
      rows.push({ id: rowId, name, phone, store, storeNo, status: 'pending', official: null });
    });

    renderRows();
    updateUI();
    setStep(1);
    // 自動驗證
    setTimeout(verifyAll, 300);
  };
  reader.readAsArrayBuffer(file);
}

function colLetter(n) {
  let s = ''; n++;
  while (n > 0) { s = String.fromCharCode(64 + (n % 26 || 26)) + s; n = Math.floor((n - 1) / 26); }
  return s;
}
function escXml(v) {
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

async function downloadXlsx() {
  const btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  btn.textContent = '⟳ 產生中...';

  try {
    const JSZip = await loadJSZip();

    // 載入官方模板
    // 從內嵌 base64 載入模板（不需外部檔案）
    const b64str = TEMPLATE_B64;
    const bin = atob(b64str);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const templateBuf = bytes.buffer;
    const zip = await JSZip.loadAsync(templateBuf);

    const senderName = document.getElementById('senderName').value.trim();
    const senderPhone = document.getElementById('senderPhone').value.trim();
    const serviceCode = document.getElementById('serviceCode').value;

    // 解析 sharedStrings
    const sharedRaw = await zip.file('xl/sharedStrings.xml').async('string');
    const siMatches = [...sharedRaw.matchAll(/<si>([\s\S]*?)<\/si>/g)];
    const strToIdx = {};
    const newStrings = siMatches.map((m, i) => {
      const t = m[1].match(/<t[^>]*>([\s\S]*?)<\/t>/);
      if (t) strToIdx[t[1]] = i;
      return m[1]; // 保留原始 si 內容（含 phoneticPr）
    });

    function getOrAdd(text) {
      const t = String(text);
      if (t in strToIdx) return strToIdx[t];
      const idx = newStrings.length;
      strToIdx[t] = idx;
      newStrings.push(`<t>${escXml(t)}</t>`);
      return idx;
    }

    // 資料列 style（從官方檔得知）
    const DATA_STYLES = {A:30,B:30,C:30,D:31,E:30,F:30,G:31,H:30,I:30,J:31,K:30,L:30,M:30,N:30,O:30,P:30,Q:30,R:30,S:30};

    // 建立資料列
    const dataRows = rows.map((r, i) => {
      const ri = i + 2; // row 1 是標題
      const vals = [
        'A', senderName, '886', senderPhone, serviceCode,
        r.store||'', r.storeNo||'', r.name||'',
        '886', r.phone||'', '0',
        '','','','','','','',''
      ];
      const cols = 'ABCDEFGHIJKLMNOPQRS'.split('');
      let rowXml = `<row r="${ri}" spans="1:19">`;
      vals.forEach((val, ci) => {
        const col = cols[ci];
        const addr = col + ri;
        const s = DATA_STYLES[col] || 30;
        if (val === '' || val === null || val === undefined) {
          rowXml += `<c r="${addr}" s="${s}"/>`;
        } else if (col === 'K') {
          rowXml += `<c r="${addr}" s="${s}" t="n"><v>0</v></c>`;
        } else {
          const idx = getOrAdd(val);
          rowXml += `<c r="${addr}" s="${s}" t="s"><v>${idx}</v></c>`;
        }
      });
      rowXml += '</row>';
      return rowXml;
    });

    // 讀 sheet1，保留標題列，替換資料
    const sheet1Raw = await zip.file('xl/worksheets/sheet1.xml').async('string');
    const headerRow = sheet1Raw.match(/<row r="1"[\s\S]*?<\/row>/)?.[0] || '';
    const totalRows = rows.length + 1;
    const newSheet = sheet1Raw
      .replace(/<dimension ref="[^"]+"\/>/, `<dimension ref="A1:S${totalRows}"/>`)
      .replace(/<sheetData>[\s\S]*?<\/sheetData>/, `<sheetData>${headerRow}${dataRows.join('')}</sheetData>`);

    // 重建 sharedStrings
    const newSharedEntries = newStrings.map(s => `<si>${s}</si>`).join('');
    const newShared = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${newStrings.length}" uniqueCount="${newStrings.length}">${newSharedEntries}</sst>`;

    zip.file('xl/worksheets/sheet1.xml', newSheet);
    zip.file('xl/sharedStrings.xml', newShared);

    const blob = await zip.generateAsync({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
      compression: 'DEFLATE'
    });

    const today = new Date();
    const dateStr = `${today.getMonth()+1}月${today.getDate()}日`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `A.店到店_批次匯入範例檔_${dateStr}.xlsx`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);

  } catch(err) {
    alert(`下載失敗：${err.message}\n\n請確認 A_店到店_批次匯入範例檔.xlsx 與 index.html 放在同一個資料夾。`);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⬇ 下載全家批次匯入 xlsx';
  }
}

let _jszip = null;
async function loadJSZip() {
  if (_jszip) return _jszip;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  _jszip = JSZip;
  return _jszip;
}

// ==================== STEPS ====================
function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step' + i);
    el.classList.remove('active', 'done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add('active');
  }
}

// ==================== INIT ====================
// 預加入 5 筆空白
for (let i = 0; i < 3; i++) addRow();
setStep(1);

// 預載官方資料
fetchOfficialStores().then(d => {
  console.log('已載入全家門市資料，共', Object.keys(d).length, '筆');
});
